# Deploy FastAPI backend to Azure App Service (Python runtime, no Docker)
# Requires GitHub secret: AZURE_CREDENTIALS (service principal JSON from az ad sp create-for-rbac ... --sdk-auth)
# If using environment: production, add AZURE_CREDENTIALS to the environment's secrets or repo secrets.
name: Deploy Backend to Azure

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: buildingsmanager-api
  AZURE_WEBAPP_RG: buildingsmanager-israel-rg
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into bundle
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt --target backend/.python_packages
        working-directory: .

      - name: Zip backend for deployment
        run: |
          cd backend && zip -r ../backend.zip . -x "venv/*" -x "__pycache__/*" -x "*.pyc" -x ".env" -x ".env.*" -x "*.pyo"
          cd ..

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.AZURE_WEBAPP_RG }}
          package: backend.zip

      - name: Set startup command with PYTHONPATH
        run: |
          az webapp config set --resource-group ${{ env.AZURE_WEBAPP_RG }} --name ${{ env.AZURE_WEBAPP_NAME }} \
            --startup-file "export PYTHONPATH=/home/site/wwwroot/.python_packages && gunicorn --chdir /home/site/wwwroot app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
