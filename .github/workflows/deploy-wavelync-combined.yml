# Deploy combined app to App Service: https://www.wavelync.com (app) + https://www.wavelync.com/api (API)
# Run manually or on push. Then add custom domain www.wavelync.com in Azure and DNS CNAME www → buildingsmanager-api.azurewebsites.net
name: Deploy to www.wavelync.com (combined)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-wavelync-combined.yml'

env:
  AZURE_WEBAPP_NAME: buildingsmanager-api
  AZURE_WEBAPP_RG: buildingsmanager-israel-rg
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend (same-origin /api for www.wavelync.com)
        env:
          VITE_API_URL: '/api'
        run: npm run build
      - name: Copy frontend to backend/static
        run: |
          mkdir -p backend/static
          cp -r dist/* backend/static/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies into bundle
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt --target backend/.python_packages
      - name: Zip backend (with static)
        run: |
          cd backend && zip -r ../backend.zip . -x "venv/*" -x "__pycache__/*" -x "*.pyc" -x ".env" -x ".env.*" -x "*.pyo" && cd ..

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.AZURE_WEBAPP_RG }}
          package: backend.zip
      - name: Set startup script
        run: |
          az webapp config set --resource-group ${{ env.AZURE_WEBAPP_RG }} --name ${{ env.AZURE_WEBAPP_NAME }} --startup-file "bash /home/site/wwwroot/startup.sh"
