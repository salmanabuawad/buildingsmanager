# Azure App Service Configuration for FastAPI Backend
# This file is used to configure the Azure App Service deployment

runtime:
  python:
    version: "3.11"

startup:
  command: bash startup.sh

app_settings:
  - name: SCM_DO_BUILD_DURING_DEPLOYMENT
    value: "true"
  - name: WEBSITE_HTTPLOGGING_RETENTION_DAYS
    value: "7"
