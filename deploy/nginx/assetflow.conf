# AssetFlow - nginx reverse proxy (VM deployment)
# www.wavelync.com (app at /, API at /api) -> gunicorn on 127.0.0.1:8000
# Copy to /etc/nginx/sites-available/assetflow, enable, then: certbot --nginx -d www.wavelync.com

# Redirect HTTP to HTTPS (uncomment after SSL is set up with certbot)
# server {
#     listen 80;
#     server_name www.wavelync.com wavelync.com app.wavelync.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name www.wavelync.com wavelync.com app.wavelync.com;
    root /var/www/assetflow/static;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SPA - try files, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API -> FastAPI (gunicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
