# AssetFlow - HTTP redirect + HTTPS (self-signed cert)
upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2 default_server;
    server_name _;
    ssl_certificate     /etc/nginx/ssl/assetflow.crt;
    ssl_certificate_key /etc/nginx/ssl/assetflow.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    root /var/www/buildingsmanager;
    index index.html;
    try_files $uri $uri/ /index.html;
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    location ~ ^/(health|docs|openapi.json|redoc) {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
