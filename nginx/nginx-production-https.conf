# AssetFlow - Production with HTTPS (wavelync.com + www.wavelync.com)
# Used by deploy when Let's Encrypt certs exist.
upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}
server {
    listen 80 default_server;
    server_name wavelync.com www.wavelync.com 185.229.226.37 _;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2 default_server;
    server_name wavelync.com www.wavelync.com 185.229.226.37 _;
    ssl_certificate     /etc/letsencrypt/live/wavelync.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wavelync.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    root /var/www/buildingsmanager;
    index index.html;
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location /assets/ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    try_files $uri $uri/ /index.html;
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    location ~ ^/(health|docs|openapi.json|redoc) {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
