# AssetFlow - HTTP only, for certbot (wavelync.com + www.wavelync.com)
# Certbot will add HTTPS blocks automatically.
upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}
server {
    listen 80 default_server;
    server_name wavelync.com www.wavelync.com 185.229.226.37 _;
    root /var/www/buildingsmanager;
    index index.html;
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location /assets/ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    try_files $uri $uri/ /index.html;
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    location ~ ^/(health|docs|openapi.json|redoc) {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
