# Windows: use this as conf/nginx.conf when Nginx is in C:\nginx.
# Proxies /api to the backend (port 8000). Required for the app (same-origin API only).
# Root and paths use forward slashes.

worker_processes  1;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream fastapi_backend {
        server 127.0.0.1:8000;
        keepalive 4;
    }

    server {
        listen 80 default_server;
        server_name _;

        root C:/nginx/html/buildingsmanager;
        index index.html;
        try_files $uri $uri/ /index.html;

        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            client_max_body_size 10M;
            proxy_redirect off;
        }
        location /storage/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_redirect off;
        }

        location ~ ^/(health|docs|openapi.json|redoc) {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
