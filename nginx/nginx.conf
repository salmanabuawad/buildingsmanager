# Nginx: port 80 for frontend (static) and API (proxy to FastAPI).
# Proxies /api to the backend (port 8000). Required for the app (same-origin API only).
# - Frontend: http://<host>/ (React/Vite build)
# - API:      http://<host>/api/ → FastAPI backend
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled, or include in http {}
# See docs/PROXY_API.md

# Upstream for FastAPI (uvicorn/gunicorn)
upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}

server {
    listen 80 default_server;
    server_name _;   # replace with your domain, e.g. app.example.com

    # React build (Vite default output)
    root /var/www/buildingsmanager/dist;
    index index.html;
    try_files $uri $uri/ /index.html;

    # API: proxy to FastAPI
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Optional: health and OpenAPI docs
    location ~ ^/(health|docs|openapi.json|redoc) {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

