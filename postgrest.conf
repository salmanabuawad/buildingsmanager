# PostgREST Configuration for Local Development
# This allows the Supabase client to work with local PostgreSQL

# Database connection
db-uri = "postgres://postgres:postgres@localhost:5432/buildings_manager"
db-schema = "public"
db-anon-role = "postgres"

# Server settings
server-host = "localhost"
server-port = 3000

# JWT settings (optional for local dev without auth)
# jwt-secret = "your-secret-key-here"
# jwt-aud = "authenticated"

# API settings
db-pool = 10
db-pool-timeout = 10

# OpenAPI
openapi-mode = "ignore-privileges"

# Logging
log-level = "info"
